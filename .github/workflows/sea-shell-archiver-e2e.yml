name: S_ARCH e2e-sea-shell-archiver

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  e2e-electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'adopt'
          cache: maven

      - name: Start Docker
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_on: error
          timeout_seconds: 2400
          command: |
            make dcup-full-action

      - name: Run Cypress
        run: make cypress-electron

  e2e-chrome:
